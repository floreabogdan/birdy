name: Release

# Cut a release by pushing a tag:  git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags: ["v*"]

jobs:
  binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and upload assets
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true

      - name: Cross-compile
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X github.com/floreabogdan/birdy/internal/buildinfo.Version=${VERSION}"
          targets="linux/amd64 linux/arm64 linux/arm freebsd/amd64 darwin/amd64 darwin/arm64"
          for t in $targets; do
            export GOOS=${t%/*} GOARCH=${t#*/} CGO_ENABLED=0
            echo "building $GOOS/$GOARCH"
            go build -trimpath -ldflags="$LDFLAGS" -o birdy ./cmd/birdy
            tar -czf "dist/birdy_${VERSION}_${GOOS}_${GOARCH}.tar.gz" birdy LICENSE README.md
            rm -f birdy
          done
          ( cd dist && sha256sum *.tar.gz > SHA256SUMS.txt )
          ls -la dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  image:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to ghcr.io
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v3 # arm64 via emulation
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}

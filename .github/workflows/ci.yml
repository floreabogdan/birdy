name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"
          check-latest: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      # Build golangci-lint from source with this job's Go, so its toolchain is
      # never older than the go.mod target (a prebuilt binary refuses that).
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
          golangci-lint run ./...

      - name: go test
        run: go test -race ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: build
        run: CGO_ENABLED=0 go build ./cmd/birdy

  # A separate job so a BIRD-version quirk here never masks the unit signal
  # above. It renders birdy's config and runs the real `bird -p` parser over it.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"
          check-latest: true

      - name: Install BIRD
        run: sudo apt-get update && sudo apt-get install -y bird2

      - name: integration tests
        run: |
          bird --version || true
          go test -tags integration -run TestIntegration ./...
